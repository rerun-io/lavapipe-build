name: Build Lavapipe

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build lavapipe
        run: ./build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lavapipe-macos-arm64
          path: lavapipe-macos-arm64.tar.gz

  test:
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download lavapipe artifact
        uses: actions/download-artifact@v4
        with:
          name: lavapipe-macos-arm64

      - name: Extract lavapipe
        run: tar xzf lavapipe-macos-arm64.tar.gz

      - name: Install lavapipe runtime dependencies
        run: |
          brew install vulkan-loader llvm zstd spirv-tools
          # Symlink Vulkan loader to a path dlopen searches by default
          sudo mkdir -p /usr/local/lib
          sudo ln -sf /opt/homebrew/lib/libvulkan.dylib /usr/local/lib/libvulkan.dylib
          sudo ln -sf /opt/homebrew/lib/libvulkan.1.dylib /usr/local/lib/libvulkan.1.dylib

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build test
        working-directory: test-wgpu-triangle
        run: cargo build --release

      - name: Run snapshot test
        working-directory: test-wgpu-triangle
        env:
          VK_DRIVER_FILES: ${{ github.workspace }}/lavapipe-macos-arm64/lvp_icd.aarch64.json
        run: cargo run --release

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-wgpu-triangle/output.png

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lavapipe-macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lavapipe-macos-arm64.tar.gz
          generate_release_notes: true
