name: Build Lavapipe

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build lavapipe
        run: ./build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lavapipe-macos-arm64
          path: lavapipe-macos-arm64.tar.gz

  test:
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download lavapipe artifact
        uses: actions/download-artifact@v4
        with:
          name: lavapipe-macos-arm64

      - name: Extract lavapipe
        run: tar xzf lavapipe-macos-arm64.tar.gz

      - name: Install Vulkan loader
        run: brew install vulkan-loader

      - name: Verify Vulkan setup
        env:
          VK_DRIVER_FILES: ${{ github.workspace }}/lavapipe-macos-arm64/share/vulkan/icd.d/lvp_icd.aarch64.json
          VK_LOADER_DRIVERS_SELECT: lvp
          DYLD_FALLBACK_LIBRARY_PATH: /opt/homebrew/lib
        run: |
          echo "=== Checking Vulkan loader ==="
          ls -la /opt/homebrew/lib/libvulkan* || echo "No libvulkan in /opt/homebrew/lib"
          ls -la /usr/local/lib/libvulkan* 2>/dev/null || echo "No libvulkan in /usr/local/lib"
          echo "=== Checking ICD JSON ==="
          cat $VK_DRIVER_FILES
          echo "=== Checking lavapipe dylib ==="
          ls -la ${{ github.workspace }}/lavapipe-macos-arm64/lib/
          echo "=== Checking otool ==="
          otool -L ${{ github.workspace }}/lavapipe-macos-arm64/lib/libvulkan_lvp.dylib

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build test
        working-directory: test-wgpu-triangle
        run: cargo build --release

      - name: Run snapshot test
        working-directory: test-wgpu-triangle
        env:
          VK_DRIVER_FILES: ${{ github.workspace }}/lavapipe-macos-arm64/share/vulkan/icd.d/lvp_icd.aarch64.json
          VK_LOADER_DRIVERS_SELECT: lvp
          DYLD_FALLBACK_LIBRARY_PATH: /opt/homebrew/lib
          RUST_LOG: wgpu_hal=debug,wgpu_core=debug
        run: cargo run --release -- generate

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-wgpu-triangle/output.png

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lavapipe-macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lavapipe-macos-arm64.tar.gz
          generate_release_notes: true
