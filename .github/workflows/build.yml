name: Build Lavapipe

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build lavapipe
        run: ./build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lavapipe-macos-arm64
          path: lavapipe-macos-arm64.tar.gz

  test:
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download lavapipe artifact
        uses: actions/download-artifact@v4
        with:
          name: lavapipe-macos-arm64

      - name: Extract lavapipe
        run: tar xzf lavapipe-macos-arm64.tar.gz

      - name: Install lavapipe runtime dependencies
        run: brew install vulkan-loader llvm zstd spirv-tools

      - name: Verify Vulkan setup
        env:
          VK_DRIVER_FILES: ${{ github.workspace }}/lavapipe-macos-arm64/share/vulkan/icd.d/lvp_icd.aarch64.json
        run: |
          echo "=== Lavapipe lib contents ==="
          ls -la ${{ github.workspace }}/lavapipe-macos-arm64/lib/
          echo "=== Dylib dependencies ==="
          otool -L ${{ github.workspace }}/lavapipe-macos-arm64/lib/libvulkan_lvp.dylib
          echo "=== Checking deps exist ==="
          ls -la /opt/homebrew/opt/llvm/lib/libLLVM.dylib
          ls -la /opt/homebrew/opt/zstd/lib/libzstd.1.dylib
          ls -la /opt/homebrew/opt/spirv-tools/lib/libSPIRV-Tools.dylib

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build test
        working-directory: test-wgpu-triangle
        run: cargo build --release

      - name: Run snapshot test
        working-directory: test-wgpu-triangle
        env:
          VK_DRIVER_FILES: ${{ github.workspace }}/lavapipe-macos-arm64/share/vulkan/icd.d/lvp_icd.aarch64.json
          VK_LOADER_DEBUG: all
          RUST_LOG: wgpu_hal=debug,wgpu_core=debug
        run: cargo run --release -- generate

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-wgpu-triangle/output.png

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lavapipe-macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lavapipe-macos-arm64.tar.gz
          generate_release_notes: true
